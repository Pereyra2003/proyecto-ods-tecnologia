<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Alerta Vecinal - Bajo Piura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100-vh;
        }
        .premium-card { 
            border-radius: 28px; 
            background: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 10px 10px -5px rgba(15, 23, 42, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #dc3545;
            font-weight: 600;
        }
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
            padding-left: 45px !important;
            transition: all 0.25s ease-in-out;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #dc3545;
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.12);
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #94a3b8;
            transition: color 0.2s;
        }
        .form-control:focus ~ .input-icon {
            color: #dc3545;
        }
        /* Estilo para el selector visual de tipo de incidente */
        .incident-option {
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }
        .incident-option:hover {
            border-color: #cbd5e1;
            background-color: #f1f5f9;
        }
        .incident-radio:checked + .incident-option {
            border-color: #dc3545;
            background-color: #fff5f5;
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.08);
        }
        .incident-radio:checked + .incident-option h6 {
            color: #b91c1c !important;
        }
        /* Zona Dropzone de fotos */
        .photo-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .photo-zone:hover {
            border-color: #dc3545;
            background-color: #fff5f5;
        }
    </style>
</head>
<body>

    <div class="container my-5" style="max-width: 520px;">
        
        <div class="mb-4 px-2">
            <a th:href="@{/reportes}" class="text-decoration-none text-secondary fw-bold small d-inline-flex align-items-center gap-2 bg-white px-3 py-2 rounded-pill shadow-sm transition-all hover:text-dark">
                <i class="bi bi-arrow-left-short fs-5 text-dark"></i> Volver al panel de Alertas
            </a>
        </div>

        <div class="card premium-card p-3 p-sm-4">
            <div class="card-body">
                
                <div class="text-center mb-4">
                    <div class="bg-danger bg-opacity-10 text-danger d-inline-flex rounded-4 p-3 mb-3 shadow-inner">
                        <i class="bi bi-shield-fill-exclamation fs-1"></i>
                    </div>
                    <h3 class="fw-extrabold text-slate-900 tracking-tight mb-1" style="font-weight: 800;">Reportar Incidente</h3>
                    <p class="text-muted small px-2">Su reporte será enviado instantáneamente a la base de datos de Supabase y alertará a los comités vecinales.</p>
                </div>
                
                <form id="alertForm" th:action="@{/reportes/guardar}" th:object="${reporte}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
                    
                    <div class="mb-4 position-relative">
                        <label class="form-label fw-bold text-dark small text-uppercase tracking-wider mb-2">Identificación</label>
                        <div class="position-relative">
                            <i class="bi bi-person-badge-fill input-icon fs-5"></i>
                            <input type="text" th:field="*{liderNombre}" class="form-control py-3" placeholder="Ingresa tu nombre completo" required>
                        </div>
                    </div>

                    <div class="mb-4 position-relative">
                        <label class="form-label fw-bold text-dark small text-uppercase tracking-wider mb-2">Zona o Caserío Afectado</label>
                        <div class="position-relative">
                            <i class="bi bi-geo-alt-fill input-icon fs-5"></i>
                            <input type="text" th:field="*{comunidad}" class="form-control py-3" placeholder="Ej. Cura Mori, Sector Chico" required>
                        </div>
                    </div>

                    <input type="hidden" id="tipoIncidenteHidden" th:field="*{tipoIncidente}" value="DESBORDE" required>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small text-uppercase tracking-wider mb-2">Seleccione el Tipo de Amenaza</label>
                        <div class="row g-2">
                            
                            <div class="col-12">
                                <input type="radio" name="tipoVisual" id="tipo1" value="DESBORDE" checked class="btn-check incident-radio" onchange="seleccionarTipo('DESBORDE')">
                                <label for="tipo1" class="d-flex align-items-center incident-option w-full gap-3">
                                    <span class="fs-2">🚨</span>
                                    <div>
                                        <h6 class="fw-bold text-dark mb-0" style="font-size:0.95rem;">Inundación / Desborde Inminente</h6>
                                        <small class="text-muted" style="font-size:0.78rem;">Peligro crítico por agua o ríos colapsados.</small>
                                    </div>
                                </label>
                            </div>

                            <div class="col-12">
                                <input type="radio" name="tipoVisual" id="tipo2" value="CANAL_BLOQUEADO" class="btn-check incident-radio" onchange="seleccionarTipo('CANAL_BLOQUEADO')">
                                <label for="tipo2" class="d-flex align-items-center incident-option w-full gap-3">
                                    <span class="fs-2">🚧</span>
                                    <div>
                                        <h6 class="fw-bold text-dark mb-0" style="font-size:0.95rem;">Canal de Regadío Bloqueado</h6>
                                        <small class="text-muted" style="font-size:0.78rem;">Obstrucción de drenes o compuertas agrícolas.</small>
                                    </div>
                                </label>
                            </div>

                            <div class="col-12">
                                <input type="radio" name="tipoVisual" id="tipo3" value="PLAGA" class="btn-check incident-radio" onchange="seleccionarTipo('PLAGA')">
                                <label for="tipo3" class="d-flex align-items-center incident-option w-full gap-3">
                                    <span class="fs-2">🐛</span>
                                    <div>
                                        <h6 class="fw-bold text-dark mb-0" style="font-size:0.95rem;">Plaga Detectada en Cultivos</h6>
                                        <small class="text-muted" style="font-size:0.78rem;">Amenaza biológica o de insectos en sembríos.</small>
                                    </div>
                                </label>
                            </div>

                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small text-uppercase tracking-wider mb-2">Detalles de la Emergencia</label>
                        <textarea th:field="*{descripcion}" class="form-control p-3 bg-slate-50" style="padding-left: 16px !important; border-radius: 18px; resize: none;" rows="3" placeholder="¿Qué apoyo se necesita? Detalla puntos de referencia o gravedad..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small text-uppercase tracking-wider mb-2">Capturar Evidencia Visual</label>
                        <label class="w-100 photo-zone p-4 text-center d-block position-relative">
                            <i class="bi bi-camera-fill text-danger display-5 d-block mb-1"></i>
                            <span class="fw-bold text-dark d-block mb-1" style="font-size:0.9rem;">Haga clic para tomar o subir foto</span>
                            <span id="file-status" class="text-muted font-monospace" style="font-size:0.75rem;">Formatos aceptados: JPG, PNG</span>
                            <input type="file" name="imagenArchivo" id="imageFile" class="d-none" accept="image/*" onchange="mostrarArchivoSeleccionado(this)">
                        </label>
                    </div>

                    <div class="d-grid pt-2">
                        <button type="submit" id="submitBtn" class="btn btn-danger btn-lg shadow fw-bold py-3.5" style="border-radius: 18px; font-size: 1.05rem; background: linear-gradient(135deg, #dc3545 0%, #b91c1c 100%); border:none;">
                            <span id="btnText"><i class="bi bi-cloud-arrow-up-fill me-2"></i> Publicar Alerta Inmediata</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Vincula el selector de botones visuales al input oculto de Thymeleaf
        function seleccionarTipo(valor) {
            document.getElementById('tipoIncidenteHidden').value = valor;
        }

        // Muestra dinámicamente si ya se subió una foto
        function mostrarArchivoSeleccionado(input) {
            const status = document.getElementById('file-status');
            if (input.files && input.files[0]) {
                status.innerHTML = "✅ Archivo cargado: <strong class='text-success'>" + input.files[0].name + "</strong>";
                status.classList.remove('text-muted');
            }
        }

        // Pantalla de carga profesional e inteligente
        document.getElementById('alertForm').addEventListener('submit', function(event) {
            if (!this.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
                this.classList.add('was-validated');
            } else {
                const btn = document.getElementById('submitBtn');
                const text = document.getElementById('btnText');
                const spinner = document.getElementById('btnSpinner');
                
                btn.disabled = true;
                btn.style.background = "#64748b"; // Cambia a color slate neutro procesando
                text.innerText = "Procesando multimedia en Cloudinary...";
                spinner.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
